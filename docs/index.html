<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #fff;
        }

        button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            background: #fff;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #888;
        }

        .note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Downloader</h1>
        <input type="text" id="url" placeholder="Вставьте ссылку на видео">
        <button onclick="download()">Скачать</button>
        <div id="status"></div>
        <div class="note">Для работы требуется запущенный сервер</div>
    </div>
    <script>
        async function download() {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            
            if (!url) {
                status.textContent = 'Введите ссылку';
                return;
            }
            
            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                status.textContent = 'Неверная ссылка';
                return;
            }
            
            status.textContent = 'Обработка...';
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки');
                
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'video.mp4';
                a.click();
                
                status.textContent = 'Готово';
            } catch (error) {
                status.textContent = 'Ошибка';
            }
        }

        document.getElementById('url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') download();
        });
    </script>
</body>
</html>
