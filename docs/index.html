<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #fff;
        }

        button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            background: #fff;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #888;
        }

        a {
            color: #fff;
            text-decoration: none;
            margin-top: 2rem;
            display: inline-block;
            font-size: 0.85rem;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Downloader</h1>
        <input type="text" id="url" placeholder="Вставьте ссылку на видео">
        <button onclick="download()">Скачать</button>
        <div id="status"></div>
        <a href="https://github.com/DarkFimoz/YouTube-Downloader" target="_blank">GitHub</a>
    </div>
    <script>
        function getVideoId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        async function download() {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            
            if (!url) {
                status.textContent = 'Введите ссылку';
                return;
            }
            
            const videoId = getVideoId(url);
            if (!videoId) {
                status.textContent = 'Неверная ссылка';
                return;
            }
            
            status.textContent = 'Обработка...';
            
            try {
                const apiUrl = `https://api.cobalt.tools/api/json`;
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: url,
                        vCodec: 'h264',
                        vQuality: '720',
                        aFormat: 'mp3',
                        isAudioOnly: false
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'redirect' || data.status === 'stream') {
                    const downloadUrl = data.url;
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 'video.mp4';
                    a.target = '_blank';
                    a.click();
                    status.textContent = 'Готово';
                } else {
                    status.textContent = 'Ошибка';
                }
            } catch (error) {
                status.textContent = 'Ошибка';
            }
        }

        document.getElementById('url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') download();
        });
    </script>
</body>
</html>
